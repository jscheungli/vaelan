<!doctype html>
<html lang="fr" data-bs-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ app_name }}{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
  <style>
    body { background:#f6f7f9; }
    .brand { font-weight:700; letter-spacing:.5px; }
    .tile { transition:transform .08s ease; cursor:default; }
    .tile a { text-decoration:none; }
    .status-ok { border-left:4px solid #198754; }
    .status-warn { border-left:4px solid #ffc107; }
    .status-error { border-left:4px solid #dc3545; }
    .status-neutral { border-left:4px solid #adb5bd; }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg bg-dark" data-bs-theme="dark">
  <div class="container">
    <a class="navbar-brand brand" href="/"><i class="bi bi-shield-check"></i> {{ app_name }}</a>
    <div class="ms-auto d-flex align-items-center gap-3">
      {% if user %}
        <span class="navbar-text small"><i class="bi bi-person-circle"></i> {{ user.name }}</span>
        <a class="btn btn-sm btn-outline-light" href="/logout"><i class="bi bi-box-arrow-right"></i></a>
      {% endif %}
    </div>
  </div>
</nav>
<main class="container py-4">
  {% block content %}{% endblock %}
</main>
<footer class="container text-center small text-muted pb-3">
  {{ app_name }} <span class="fw-semibold">v{{ version }}</span>{% if commit and commit != 'dev' %} · <code>{{ commit }}</code>{% endif %}
</footer>
</body>
</html>
