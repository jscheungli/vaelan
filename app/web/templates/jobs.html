{% extends "base.html" %}
{% block title %}Tâches · {{ app_name }}{% endblock %}
{% block content %}
<div class="d-flex align-items-center mb-3">
  <h1 class="h4 mb-0">Tâches</h1>
  <form method="post" action="/jobs/demo" class="ms-auto">
    <button class="btn btn-sm btn-outline-dark"><i class="bi bi-play-circle"></i> Lancer une tâche démo</button>
  </form>
</div>
<p class="text-muted small">Suivi en direct des exécutions (imports, calculs, remédiations…).</p>

<div id="jobs-feed" hx-get="/jobs/feed" hx-trigger="load, every 2s" hx-swap="innerHTML">
  <div class="text-muted small">chargement…</div>
</div>
{% endblock %}
