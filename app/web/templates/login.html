{% extends "base.html" %}
{% block title %}Connexion · {{ app_name }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-sm-9 col-md-6 col-lg-4">
    <div class="card shadow-sm mt-5">
      <div class="card-body p-4">
        <h1 class="h4 mb-1 brand">{{ app_name }}</h1>
        <p class="text-muted small mb-4">Contrôles comptables</p>
        {% if error %}<div class="alert alert-danger py-2 small">{{ error }}</div>{% endif %}
        <form method="post" action="/login">
          <div class="mb-3">
            <label class="form-label small">Email</label>
            <input type="email" name="email" class="form-control" required autofocus>
          </div>
          <div class="mb-3">
            <label class="form-label small">Mot de passe</label>
            <input type="password" name="password" class="form-control" required>
          </div>
          <button class="btn btn-dark w-100"><i class="bi bi-box-arrow-in-right"></i> Se connecter</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
