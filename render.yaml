# Render Blueprint — service web Vaelan + base Postgres
services:
  - type: web
    name: vaelan
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vaelan-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      # Clés API à renseigner dans le dashboard Render (sync: false = secret)
      - key: PENNYLANE_STERNA_TOKEN
        sync: false
      - key: PENNYLANE_KOOKABURA_TOKEN
        sync: false
      - key: TOPORDER_KEYS
        sync: false

databases:
  - name: vaelan-db
    plan: basic-256mb
