# Render Blueprint — service web Vaelan + base Postgres
services:
  - type: web
    name: vaelan
    runtime: python
    plan: starter
    region: frankfurt          # Europe (même région que la base pour la connexion interne)
    autoDeploy: true           # redéploie à chaque push sur la branche suivie
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION       # figer une version stable (éviter le 3.14 bleeding-edge)
        value: "3.12.8"
      - key: DATABASE_URL
        fromDatabase:
          name: vaelan-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      # Clés API à renseigner dans le dashboard Render (sync: false = secret)
      - key: PENNYLANE_STERNA_TOKEN
        sync: false
      - key: PENNYLANE_KOOKABURA_TOKEN
        sync: false
      # TopOrder — une clé par établissement
      - key: TOPORDER_OCOPAIN_SAINT_LEU_KEY
        sync: false
      - key: TOPORDER_OCOPAIN_LA_POSSESSION_KEY
        sync: false
      - key: TOPORDER_OCOPAIN_SAINTE_MARIE_KEY
        sync: false
      - key: TOPORDER_KOOKABURA_KEY
        sync: false

databases:
  - name: vaelan-db
    plan: basic-256mb
    region: frankfurt          # Europe
